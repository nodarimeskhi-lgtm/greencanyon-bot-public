<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #F4F6F6;
            font-family: 'Arial', sans-serif;
            display: flex;
        }

        .left {
            width: 50%;
            padding-right: 20pt;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right {
            width: 50%;
        }

        .right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8pt;
            display: block;
        }

        h2 {
            font-size: 32pt;
            margin: 0 0 20pt 0;
            color: #145A32;
        }

        ul {
            padding-left: 20pt;
            margin: 0;
        }

        li {
            font-size: 16pt;
            color: #555;
            margin-bottom: 20pt;
            line-height: 1.4;
        }

        strong {
            color: #1E8449;
        }
    </style>
</head>

<body>
    <div class="left">
        <h2>The Anti-Office</h2>
        <ul>
            <li>High-Speed <strong>Starlink</strong> Internet.</li>
            <li>Co-Working Lounge with Canyon Views.</li>
            <li>Deep Focus in Nature.</li>
        </ul>
    </div>
    <div class="right">
        <img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_2.jpg">
    </div>
</body>

</html>
