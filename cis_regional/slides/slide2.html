<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 30pt;
            background: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
        }

        .text-col {
            width: 50%;
            padding-right: 20pt;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chart-col {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 28pt;
            color: #2E4053;
            margin: 0 0 20pt 0;
        }

        ul {
            padding-left: 20pt;
            margin: 0;
        }

        li {
            font-size: 16pt;
            color: #555;
            margin-bottom: 15pt;
            line-height: 1.4;
        }

        .gold {
            color: #B7950B;
            font-weight: bold;
        }

        /* Placeholder */
        #mix-chart {
            width: 100%;
            height: 250pt;
            background: #f9f9f9;
        }
    </style>
</head>

<body>
    <div class="text-col">
        <h2>The Best of Both Worlds</h2>
        <ul>
            <li><strong>High Yield:</strong> <span class="gold">12-15% ROI</span> per annum.</li>
            <li><strong>Personal Use:</strong> 2 Weeks Free Stay every year.</li>
            <li><strong>Capital Growth:</strong> Estimated 30% appreciation.</li>
        </ul>
    </div>
    <div class="chart-col">
        <div id="mix-chart" class="placeholder"></div>
    </div>
</body>

</html>
