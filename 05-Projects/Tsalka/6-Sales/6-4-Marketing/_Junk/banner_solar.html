<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Canyon Eco Village - Portrait Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --eco-green: #1a4a3a;
            --pure-white: #ffffff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .banner-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-image: url('file:///c:/Users/Nodar/2026%20antigraviti/05-Projects/Tsalka/6-Sales/6-4-Marketing/Assets/banner_bg_solar.png');
            background-size: cover;
            background-position: center;
        }

        .top-text {
            margin-top: 60px;
            text-align: center;
            z-index: 10;
        }

        .title {
            font-family: 'Great Vibes', cursive;
            font-size: 64px;
            color: var(--eco-green);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
            margin: 0;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 300;
            color: var(--eco-green);
            margin-top: -10px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .qr-code-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 140px;
            height: 140px;
            background: white;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }

        .qr-code {
            width: 120px;
            height: 120px;
            background-image: url('file:///c:/Users/Nodar/2026%20antigraviti/05-Projects/Tsalka/6-Sales/6-4-Marketing/Assets/image_48_qr.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>

<body>
    <div class="banner-container">
        <div class="top-text">
            <h1 class="title">Green Canyon Eco Village</h1>
            <p class="subtitle">Coming soon in Georgia</p>
        </div>

        <div class="qr-code-container">
            <div class="qr-code"></div>
        </div>
    </div>
</body>

</html>
