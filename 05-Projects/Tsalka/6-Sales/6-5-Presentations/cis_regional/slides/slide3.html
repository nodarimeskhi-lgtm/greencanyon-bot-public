<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #F4F6F6;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 28pt;
            color: #2E4053;
            margin: 0 0 10pt 0;
        }

        p.intro {
            font-size: 16pt;
            color: #7F8C8D;
            margin: 0 0 20pt 0;
        }

        .content {
            display: flex;
            gap: 20pt;
            flex: 1;
        }

        .img-box {
            width: 50%;
            height: 100%;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4pt;
            display: block;
        }

        .text-box {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        p.desc {
            font-size: 14pt;
            color: #555;
            line-height: 1.5;
            margin-bottom: 20pt;
        }

        .highlight {
            font-weight: bold;
            color: #2E4053;
        }
    </style>
</head>

<body>
    <h2>Location: Tsalka Canyon</h2>
    <p class="intro">The "New Gudauri" of Eco-Tourism.</p>
    <div class="content">
        <div class="img-box">
            <img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_4.jpg">
        </div>
        <div class="text-box">
            <p class="desc">Located just <span class="highlight">1 hour 45 min</span> from Tbilisi.</p>
            <p class="desc">A pristine nature reserve with heavy government infrastructure investment.</p>
            <p class="desc">Year-round active tourism season.</p>
        </div>
    </div>
</body>

</html>
