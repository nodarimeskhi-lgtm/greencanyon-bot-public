<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #2E4053;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h2 {
            font-size: 36pt;
            margin: 0 0 20pt 0;
        }

        p.text {
            font-size: 18pt;
            color: #BDC3C7;
            max-width: 600pt;
            line-height: 1.5;
            margin-bottom: 40pt;
        }

        .contact-box {
            border-top: 2pt solid #D4AC0D;
            padding-top: 20pt;
            display: flex;
            flex-direction: column;
        }

        .contact-item {
            font-size: 14pt;
            color: #D4AC0D;
            margin-bottom: 5pt;
            display: block;
        }
    </style>
</head>

<body>
    <h2>Secure Your Future</h2>
    <p class="text">A stable asset in a growing economy.
        The perfect hedge against inflation.</p>
    <div class="contact-box">
        <p class="contact-item">[Partner Agency Contact Info]</p>
        <p class="contact-item">www.greencanyon.ge</p>
    </div>
</body>

</html>
