<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #2E4053;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 20pt solid #D4AC0D;
            /* Gold border for premium feel */
        }

        h1 {
            font-size: 40pt;
            margin: 0 0 20pt 0;
            font-weight: bold;
            letter-spacing: 2pt;
        }

        h2 {
            font-size: 24pt;
            font-weight: normal;
            margin: 0;
            color: #D4AC0D;
        }

        .line {
            width: 100pt;
            height: 2pt;
            background: #D4AC0D;
            margin: 30pt auto;
        }
    </style>
</head>

<body>
    <h1>GREEN CANYON<br>CAPITAL</h1>
    <div class="line"></div>
    <h2>Your Capital. Your Sanctuary.</h2>
</body>

</html>
