<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #F4F6F6;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h2 {
            font-size: 36pt;
            margin: 0 0 20pt 0;
            color: #145A32;
        }

        p.text {
            font-size: 20pt;
            color: #555;
            margin: 0 0 40pt 0;
            max-width: 500pt;
            line-height: 1.5;
        }

        .btn-container {
            background: #27AE60;
            padding: 15pt 30pt;
            border-radius: 30pt;
            display: inline-block;
        }

        .btn-text {
            font-size: 18pt;
            font-weight: bold;
            color: white;
            margin: 0;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <h2>Join the Community</h2>
    <p class="text">A global tribe of creators, thinkers, and explorers.</p>
    <!-- Placeholder for white label logo or contact -->
    <div class="btn-container">
        <p class="btn-text">Invest Now</p>
    </div>
    <p style="color: #999; font-size: 12pt; margin-top: 20pt;">[Partner Agency Contact]</p>
</body>

</html>
