<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: url('../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_1.jpg');
            background-size: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            color: white;
            width: 60%;
        }

        h1 {
            font-size: 48pt;
            margin: 0 0 15pt 0;
            font-weight: bold;
            line-height: 1.1;
        }

        h2 {
            font-size: 20pt;
            font-weight: normal;
            margin: 0;
            color: #A9DFBF;
        }

        .tag-container {
            display: inline-block;
            background: #27AE60;
            padding: 5pt 10pt;
            border-radius: 4pt;
            margin-top: 20pt;
        }

        .tag-text {
            font-size: 12pt;
            color: white;
            font-weight: bold;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="content">
        <h1>Work Wild.<br>Live Green.</h1>
        <h2>The Ultimate Eco-Nomad Base.</h2>
        <div class="tag-container">
            <p class="tag-text">STARLINK READY</p>
        </div>
    </div>
</body>

</html>
