<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
        }

        .img-col {
            width: 55%;
            height: 100%;
        }

        .img-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .text-col {
            width: 45%;
            padding: 40pt;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #1B2631;
            color: white;
        }

        h2 {
            font-size: 28pt;
            margin: 0 0 20pt 0;
            color: #58D68D;
        }

        ul {
            padding-left: 20pt;
            margin: 0;
        }

        li {
            font-size: 16pt;
            color: #BDC3C7;
            margin-bottom: 20pt;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="img-col">
        <img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_3.jpg">
    </div>
    <div class="text-col">
        <h2>Adventure Doorstep</h2>
        <ul>
            <li>Canyon Hiking Trails.</li>
            <li>Waterfall Chasing.</li>
            <li>Mountain Biking.</li>
            <li>Horse Riding.</li>
        </ul>
    </div>
</body>

</html>
