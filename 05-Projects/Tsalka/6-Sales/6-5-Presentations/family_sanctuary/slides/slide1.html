<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f5f5f5; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.bg-image {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; object-fit: cover;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.4); z-index: 0;
}
.content {
  position: relative; z-index: 1; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  color: #ffffff; text-align: center; padding: 40pt;
}
h1 { font-size: 40pt; margin: 0 0 20pt 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
p { font-size: 20pt; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
.line { width: 100pt; height: 2pt; background: #ffffff; margin: 20pt auto; }
</style>
</head>
<body>
<img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_1.jpg" class="bg-image">
<div class="overlay"></div>
<div class="content">
  <h1>Your Private Sanctuary in the Green Mountains</h1>
  <div class="line"></div>
  <p>20°C Summer Breeze. Halal-Friendly. 100% Private.</p>
</div>
</body>
</html>
