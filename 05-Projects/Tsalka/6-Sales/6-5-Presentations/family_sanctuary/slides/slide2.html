<!DOCTYPE html>
<html>

<head>
  <style>
    html {
      background: #ffffff;
    }

    body {
      width: 720pt;
      height: 405pt;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
      display: flex;
    }

    .left-col {
      width: 45%;
      padding: 30pt;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #ffffff;
    }

    .right-col {
      width: 55%;
      position: relative;
    }

    .right-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h2 {
      color: #2C3E50;
      font-size: 24pt;
      margin: 0 0 20pt 0;
    }

    ul {
      margin: 0;
      padding-left: 20pt;
    }

    li {
      font-size: 14pt;
      color: #555555;
      margin-bottom: 15pt;
      line-height: 1.3;
    }

    .accent-line {
      width: 60pt;
      height: 3pt;
      background: #27AE60;
      margin-bottom: 20pt;
    }
  </style>
</head>

<body>
  <div class="left-col">
    <h2>The Need for Escape</h2>
    <div class="accent-line"></div>
    <ul>
      <li>Escape the 45°C Gulf heat.</li>
      <li>Just a 2-hour flight to fresh mountain air.</li>
      <li>A place where your family can breathe freely.</li>
    </ul>
  </div>
  <div class="right-col">
    <img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_2.jpg" class="right-img">
  </div>
</body>

</html>
