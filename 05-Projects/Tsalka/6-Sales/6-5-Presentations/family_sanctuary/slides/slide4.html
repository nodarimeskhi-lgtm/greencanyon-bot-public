<!DOCTYPE html>
<html>

<head>
    <style>
        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
            display: flex;
        }

        .right-col {
            width: 45%;
            padding: 30pt;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
            order: 2;
        }

        .left-col {
            width: 55%;
            position: relative;
            order: 1;
        }

        .left-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h2 {
            color: #8E44AD;
            font-size: 28pt;
            margin: 0 0 20pt 0;
        }

        ul {
            margin: 0;
            padding-left: 20pt;
        }

        li {
            font-size: 16pt;
            color: #555555;
            margin-bottom: 15pt;
            line-height: 1.4;
        }

        .accent-line {
            width: 60pt;
            height: 3pt;
            background: #8E44AD;
            margin-bottom: 20pt;
        }
    </style>
</head>

<body>
    <div class="left-col">
        <img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_5.jpg" class="left-img">
    </div>
    <div class="right-col">
        <h2>The Majlis & Tradition</h2>
        <div class="accent-line"></div>
        <p style="font-size: 14pt; color: #777; margin-bottom: 20pt;">Designed for the Arab Family.</p>
        <ul>
            <li>Separate Guest Reception (Majlis).</li>
            <li>Large family living zones.</li>
            <li>Grand entrances and private spaces.</li>
        </ul>
    </div>
</body>

</html>
