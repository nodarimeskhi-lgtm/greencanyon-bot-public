<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #2C3E50;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
        }

        .left {
            width: 50%;
            padding-right: 20pt;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 28pt;
            margin: 0 0 20pt 0;
        }

        p {
            font-size: 18pt;
            color: #BDC3C7;
            line-height: 1.5;
        }

        .highlight {
            color: #F1C40F;
            font-weight: bold;
        }

        #growth-chart {
            width: 100%;
            height: 200pt;
            background: #34495E;
            border-radius: 8pt;
        }
    </style>
</head>

<body>
    <div class="left">
        <h2>Exit Strategy</h2>
        <p>Land appreciation in Dashbashi is accelerating.</p>
        <p>Estimated growth: <span class="highlight">+30% in 24 months</span>.</p>
    </div>
    <div class="right">
        <div id="growth-chart" class="placeholder"></div>
    </div>
</body>

</html>
