<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #1C2833;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .accent {
            color: #F1C40F;
        }

        h1 {
            font-size: 44pt;
            margin: 0 0 10pt 0;
            text-transform: uppercase;
            letter-spacing: 2pt;
        }

        h2 {
            font-size: 24pt;
            color: #BDC3C7;
            font-weight: normal;
            margin: 0;
        }

        .line {
            width: 100pt;
            height: 4pt;
            background: #F1C40F;
            margin-top: 30pt;
        }
    </style>
</head>

<body>
    <h1>Double-Digit <span class="accent">Yields</span><br>in "The Next Bali"</h1>
    <h2>EDGE VILLAGE: High-ROI Eco-Resort Managed by Pros.</h2>
    <div class="line"></div>
</body>

</html>
