<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #f4f6f7;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .content {
            display: flex;
            flex: 1;
            align-items: center;
        }

        .text-col {
            width: 60%;
            padding-right: 30pt;
        }

        .img-col {
            width: 40%;
            height: 100%;
        }

        .img-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8pt;
            box-shadow: 0 4pt 10pt rgba(0, 0, 0, 0.1);
            display: block;
        }

        h2 {
            font-size: 28pt;
            color: #2C3E50;
            margin: 0 0 20pt 0;
        }

        p {
            font-size: 16pt;
            color: #555;
            line-height: 1.5;
            margin-bottom: 15pt;
        }

        .validator-box {
            background: #2980B9;
            color: white;
            padding: 15pt;
            border-radius: 4pt;
            font-size: 14pt;
            margin-top: 20pt;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="text-col">
            <h2>The "Eagle Hills" Validator</h2>
            <p><strong>Smart Money is here.</strong></p>
            <p>Mohamed Alabbar (Emaar) is investing <strong>$3 Billion</strong> nearby.</p>
            <div class="validator-box">
                <p style="margin:0; font-size:14pt;">Opportunity: Buy before the "Emaar Effect" doubles land prices.</p>
            </div>
        </div>
        <div class="img-col">
            <!-- Using a generic image or specific asset if available, defaulting to image_7 assuming it looks relevant -->
            <img src="../../05-Projects/Tsalka/6-Sales/Marketing/Assets/image_7.jpg">
        </div>
    </div>
</body>

</html>
