<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Green Canyon — ინტერაქციული რუქა</title>
<style>
:root{--p:#5c5a4e;--g:#8db290;--s:#a1b5a9;--r:#a24035;--bg:#f4f3ef;--w:#fff;--bd:#ddd;--mu:#6e7160;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:#333;}
.topbar{background:var(--p);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;position:sticky;top:0;z-index:200;flex-shrink:0;}
.logo{font-size:15px;font-weight:700;color:var(--s);letter-spacing:1px;}
.sub{font-size:11px;opacity:.6;}
.langs{display:flex;gap:5px;}
.lb{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:12px;}
.lb.on{background:var(--g);border-color:var(--g);}

/* LAYOUT */
.wrap{display:flex;height:calc(100vh - 44px);}

/* MAP */
.mp{flex:1;position:relative;overflow:hidden;background:#e5e3dc;cursor:grab;min-width:0;}
.mp:active{cursor:grabbing;}
.mv{position:absolute;top:0;left:0;transform-origin:0 0;}
.mv svg{display:block;max-width:none;}

/* dots hover via CSS too */
#dots circle{transition:r .12s;}
#dots circle.active{stroke-width:5!important;filter:drop-shadow(0 0 8px rgba(255,255,255,.9));}

/* map controls */
.mc{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:50;}
.mb{width:34px;height:34px;background:var(--w);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.mb:hover{background:var(--s);color:#fff;}

/* legend */
.leg{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border-radius:10px;padding:10px 14px;font-size:11px;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.li{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.ld{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.lt{border-top:1px solid var(--bd);margin-top:7px;padding-top:7px;font-weight:600;color:var(--p);}

/* CALC */
.cp{width:310px;flex-shrink:0;background:var(--w);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;}
.ch{background:var(--p);color:#fff;padding:14px 16px 12px;flex-shrink:0;}
.ch h2{font-size:15px;font-weight:700;color:var(--s);margin-bottom:3px;}
.badge{display:inline-block;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 10px;font-size:12px;margin-top:3px;}
.hint{font-size:10px;opacity:.6;margin-top:5px;}
.cb{padding:12px 14px;flex:1;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:10px;color:var(--mu);font-weight:600;margin-bottom:3px;letter-spacing:.3px;}
.ir{display:flex;align-items:center;border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
.ir.ro{background:#f8f8f6;}
.pfx,.sfx{background:#f0efe9;padding:7px 8px;font-size:11px;color:var(--mu);flex-shrink:0;}
.ir input{flex:1;border:none;padding:7px 8px;font-size:13px;font-family:inherit;background:transparent;outline:none;min-width:0;}
.sr{display:flex;align-items:center;gap:8px;}
.sr input[type=range]{flex:1;accent-color:var(--p);}
.sv{font-size:13px;font-weight:700;color:var(--p);width:38px;text-align:right;flex-shrink:0;}
.rp{background:var(--p);margin:4px -14px 0;padding:14px;}
.rr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,.1);}
.rr:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.rl{font-size:10px;opacity:.85;color:#fff;}
.rv{font-size:18px;font-weight:700;color:#fff;}
.rv.g{color:var(--g);}
.rv.s{color:var(--s);}
.ns{padding:28px 14px;text-align:center;color:var(--mu);font-size:12px;line-height:1.6;}
.ns .ic{font-size:32px;margin-bottom:10px;opacity:.5;}

/* MOBILE */
@media(max-width:640px){
  .wrap{flex-direction:column;height:auto;min-height:calc(100vh - 44px);}
  .mp{height:60vw;min-height:260px;max-height:380px;flex:none;width:100%;}
  .cp{width:100%;border-left:none;border-top:1px solid var(--bd);}
  .leg{font-size:10px;padding:6px 10px;}
  .rp{margin:4px -12px 0;padding:12px;}
  .rv{font-size:16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">🌿 GREEN CANYON</div>
    <div class="sub" data-i18n="sub">ინვესტიციის რუქა</div>
  </div>
  <div class="langs">
    <button class="lb on" onclick="setLang('ka')">KA</button>
    <button class="lb" onclick="setLang('en')">EN</button>
    <button class="lb" onclick="setLang('ru')">RU</button>
  </div>
</div>

<div class="wrap">
  <div class="mp" id="mp">
    <div class="mv" id="mv">

function fmtC(val) {
    if (!val) return '$0';
    return '$' + Math.round(val).toLocaleString('en-US');
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));
  document.querySelectorAll('[data-i18n]').forEach(el=>{
      const k=el.getAttribute('data-i18n');
      if(DICT[l] && DICT[l][k]) el.textContent=DICT[l][k];
  });
}

function openCalc() {
    if(cur) {
        // Open wix_calc.html with parameter
        window.open('wix_calc.html?plot=' + cur.id, '_blank');
    }
}

function selectPlot(pid){
  typeof P !== 'undefined' && P.forEach(d=>{if(d.id===pid) cur=d;}); // Set global cur
  if(!cur) { cur={id:pid}; } // Fallback
  
  document.querySelectorAll('#dots circle').forEach(c=>c.classList.toggle('active',c.getAttribute('data-id')===pid));
  
  document.getElementById('no-sel-msg').style.display='none';
  document.getElementById('plot-data').style.display='block';
  document.getElementById('plot-id').textContent = pid;
  
  const d = DATA[pid];
  if(d) {
      document.getElementById('v_area').textContent = d.land_area || '-';
      document.getElementById('v_house').textContent = d.house_area || '-';
      document.getElementById('v_price').textContent = fmtC(d.total_investment);
      document.getElementById('v_roi').textContent = d.financial.roi_percent ? d.financial.roi_percent.toFixed(1) + '%' : '-';
  } else {
      document.getElementById('v_area').textContent = 'N/A';
      document.getElementById('v_house').textContent = 'N/A';
      document.getElementById('v_price').textContent = 'N/A';
      document.getElementById('v_roi').textContent = 'N/A';
  }
  
  if(window.innerWidth<=640)document.querySelector('.cp').scrollIntoView({behavior:'smooth'});
}
);
}

function at(){mv.style.transform=`translate(${px}px,${py}px) scale(${sc})`;}
function dz(f,cx,cy){
  const r=mp.getBoundingClientRect();cx=cx??r.width/2;cy=cy??r.height/2;
  const ns=Math.min(8,Math.max(0.15,sc*f));
  px=cx-(cx-px)*(ns/sc);py=cy-(cy-py)*(ns/sc);sc=ns;at();
}
function rv(){
  sc=1;px=0;py=0;at();
  requestAnimationFrame(()=>{
    const r=mp.getBoundingClientRect(),svg=mv.querySelector('svg');
    if(!svg)return;
    const vb=svg.getAttribute('viewBox').split(' ');
    const svgW=parseFloat(vb[2]),svgH=parseFloat(vb[3]);svg.style.width=svgW+'px';svg.style.height=svgH+'px';
    const fitScale=Math.min(r.width/svgW,r.height/svgH)*0.95;
    sc=fitScale*2.5; px=r.width/2 - 1200*sc; py=r.height/2 - 1000*sc; at();
  });
}
mp.addEventListener('mousedown',e=>{if(e.target.closest('circle'))return;drag=true;x0=e.clientX;y0=e.clientY;px0=px;py0=py;});
window.addEventListener('mousemove',e=>{if(!drag)return;px=px0+(e.clientX-x0);py=py0+(e.clientY-y0);at();});
window.addEventListener('mouseup',()=>drag=false);
mp.addEventListener('wheel',e=>{e.preventDefault();const r=mp.getBoundingClientRect();dz(e.deltaY<0?1.12:0.89,e.clientX-r.left,e.clientY-r.top);},{passive:false});
let td=0,ts=1;
mp.addEventListener('touchstart',e=>{
  if(e.touches.length===1&&!e.target.closest('circle')){drag=true;x0=e.touches[0].clientX;y0=e.touches[0].clientY;px0=px;py0=py;}
  else if(e.touches.length===2){drag=false;td=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);ts=sc;}
},{passive:true});
mp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){px=px0+(e.touches[0].clientX-x0);py=py0+(e.touches[0].clientY-y0);at();}
  else if(e.touches.length===2){const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);sc=Math.min(8,Math.max(0.15,ts*(nd/td)));at();}
},{passive:false});
mp.addEventListener('touchend',()=>drag=false);
window.addEventListener('DOMContentLoaded',()=>{setLang('ka');setTimeout(rv,200);});
</script>
</body>
