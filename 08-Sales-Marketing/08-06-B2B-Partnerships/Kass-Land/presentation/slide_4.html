<!DOCTYPE html><html><head><style>
  body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #FCFCFC; color: #191A19; width: 960px; height: 540px; }
  .slide { width: 960px; height: 540px; padding: 40pt; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .bg-forest { background-color: #1E5128; color: #FFFFFF; }
  .bg-cream { background-color: #F4F1DE; color: #191A19; }
  h1 { font-size: 36pt; margin: 0 0 10pt 0; line-height: 1.1; }
  h2 { font-size: 24pt; color: #4E9F3D; margin: 0 0 20pt 0; }
  .bg-forest h2 { color: #C5DE82; }
  p { font-size: 18pt; margin: 0 0 15pt 0; line-height: 1.4; }
  ul { font-size: 16pt; line-height: 1.6; }
  .accent-bar { position: absolute; left: 0; top: 0; height: 100%; width: 10pt; background-color: #4E9F3D; }
  .footer { position: absolute; bottom: 20pt; left: 40pt; font-size: 10pt; color: #888; }
  .stat-box { background: #4E9F3D; color: white; padding: 15pt; border-radius: 8pt; display: inline-block; margin-top: 20pt; }
  .stat-num { font-size: 28pt; font-weight: bold; }
  .stat-label { font-size: 12pt; }
</style></head><body><!-- Slide 5: Rental Model -->
<div class="slide bg-forest">
  <h2>საოპერაციო მოდელი</h2>
  <h1>მოქნილი ფიქსირებული გადასახადი</h1>
  <p>სამართლიანი განაწილება სეზონურობის გათვალისწინებით:</p>
  <table style="width: 100%; border-collapse: collapse; margin-top: 20pt; font-size: 16pt;">
    <tr style="border-bottom: 1pt solid #4E9F3D;">
      <td style="padding: 10pt;">High Season</td>
      <td style="padding: 10pt; font-weight: bold;">40 - 50 GEL / ღამე</td>
    </tr>
    <tr style="border-bottom: 1pt solid #4E9F3D;">
      <td style="padding: 10pt;">Mid Season</td>
      <td style="padding: 10pt; font-weight: bold;">25 - 30 GEL / ღამე</td>
    </tr>
    <tr>
      <td style="padding: 10pt;">Low Season</td>
      <td style="padding: 10pt; font-weight: bold;">10 - 15 GEL / ღამე</td>
    </tr>
  </table>
</div></body></html>
