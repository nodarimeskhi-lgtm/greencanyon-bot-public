<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
        }

        .left-col {
            width: 45%;
            padding-right: 20pt;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-col {
            width: 55%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 28pt;
            color: #2C3E50;
            margin: 0 0 20pt 0;
        }

        ul {
            padding-left: 20pt;
            margin: 0;
        }

        li {
            font-size: 16pt;
            color: #555;
            margin-bottom: 15pt;
            line-height: 1.4;
        }

        .highlight {
            color: #27AE60;
            font-weight: bold;
        }

        /* Placeholder for Chart */
        #yield-chart {
            width: 100%;
            height: 250pt;
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="left-col">
        <h2>Why Georgia? Why Now?</h2>
        <ul>
            <li>Tourism grew <strong>20% YoY</strong>.</li>
            <li>Batumi yields: 10-12%.</li>
            <li>Edge Village target: <span class="highlight">12-15%</span>.</li>
            <li>Shift from "Sea" to "Eco-Tourism".</li>
        </ul>
    </div>
    <div class="right-col">
        <div id="yield-chart" class="placeholder"></div>
    </div>
</body>

</html>
